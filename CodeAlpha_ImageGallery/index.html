<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Image Gallery</title>
</head>
<body>

<header>
  <h1>Oluwatunmibi Daniel's</h1>
  <h2>Image Gallery</h2>
  <p>Click any image to view it fullscreen</p>
</header>

<div class="gallery" id="gallery"></div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
    <div class="lightbox-img-wrap">
      <img id="lb-img" src="" alt="" />
    </div>
    <span class="lb-counter" id="lb-counter"></span>
    <p class="lightbox-caption" id="lb-caption"></p>
    <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous">&#8592;</button>
    <button class="lb-nav lb-next" id="lb-next" aria-label="Next">&#8594;</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
